<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#070a14"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="icon" type="image/png" href="/branding/logo"><link rel="apple-touch-icon" href="/branding/logo"><link rel="manifest" href="/static/manifest.webmanifest"><title>Student — QuizMark</title><link rel="stylesheet" href="/static/style.css"></head>
<body><div class="wrap">
  <header class="top"><div class="brand-group"><img class="brand-logo" src="/branding/logo" alt="" onerror="this.style.display='none'"><div class="brand-text"><div class="brand">Quiz<span>Mark</span></div><div class="brand-tagline">Student workspace</div></div></div><nav><a href="/static/index.html">Home</a><a href="/static/lecturer.html">Lecturer</a></nav></header>
  <h1>Find your quizzes</h1><p class="lede">Choose your module to see every quiz assigned to it. No quiz ID needed.</p>
  <section class="card" id="moduleCard"><h2>1. Choose a module</h2><div id="moduleList" class="module-list"></div><div id="moduleMsg"></div></section>
  <section class="card hidden" id="quizListCard"><div class="admin-editor-heading"><div><span class="kicker" id="moduleLabel">Module</span><h2>Available quizzes</h2></div><button class="btn secondary" id="backToModulesBtn">All modules</button></div><div id="quizList" class="admin-list"></div><div id="quizListMsg"></div></section>
  <section class="card hidden" id="quizCard"><h2 id="quizTitle"></h2><p class="muted" id="quizModule"></p><label for="studentName">Your name</label><input type="text" id="studentName" placeholder="Full name"><label for="studentId">Your student ID</label><input type="text" id="studentId" placeholder="e.g. ST12345"><div id="questionsBox"></div><button class="btn" id="submitBtn">Submit answers</button><div id="submitMsg"></div></section>
  <section class="card hidden" id="resultCard"><h2>Submitted</h2><p id="autoScoreText" class="muted"></p><div id="scoreStamp"></div><p id="pendingNote" class="muted"></p><button class="btn secondary" id="downloadNewBtn">Download my script</button></section>
  <section class="card"><h2>My results &amp; scripts</h2><p class="muted">Enter your student ID to view your marks and download your submitted scripts.</p><label for="checkStudentId">Your student ID</label><input type="text" id="checkStudentId" placeholder="e.g. ST12345"><button class="btn secondary" id="checkBtn">View my results</button><div id="resultsBox"></div></section>
</div>
<script>
const $=id=>document.getElementById(id); let currentQuiz=null, currentSubmissionId=null;
function escapeHtml(v){const e=document.createElement('div');e.textContent=v??'';return e.innerHTML}
function showMsg(el,text,kind){el.innerHTML=`<div class="msg ${kind}">${escapeHtml(text)}</div>`}
function limitShortAnswer(input){const words=input.value.trim().split(/\s+/).filter(Boolean);if(words.length>2)input.value=words.slice(0,2).join(' ')}
async function api(path,options){const r=await fetch(path,options);let d=null;try{d=await r.json()}catch(_){}if(!r.ok)throw new Error((d&&d.detail)||r.statusText);return d}
function formatSAST(value){return new Date(value).toLocaleString('en-ZA',{timeZone:'Africa/Johannesburg',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false})+' SAST'}
async function loadModules(){try{const modules=await api('/quiz-modules');$('moduleList').innerHTML=modules.length?modules.map(m=>`<button class="module-card" data-module="${escapeHtml(m.module_code)}"><strong>${escapeHtml(m.module_code)}</strong><span>${m.quiz_count} quiz${m.quiz_count===1?'':'zes'}</span></button>`).join(''):'<p class="muted">No quizzes are available yet.</p>';document.querySelectorAll('[data-module]').forEach(b=>b.addEventListener('click',()=>loadModule(b.dataset.module)))}catch(err){showMsg($('moduleMsg'),`Could not load modules: ${err.message}`,'error')}}
async function loadModule(code){$('moduleLabel').textContent=code;$('moduleCard').classList.add('hidden');$('quizListCard').classList.remove('hidden');$('quizList').innerHTML='<p class="muted">Loading quizzes…</p>';try{const quizzes=await api(`/quizzes/by-module/${encodeURIComponent(code)}`);$('quizList').innerHTML=quizzes.length?quizzes.map(q=>`<button class="admin-list-item" data-quiz="${q.id}"><span><strong>${escapeHtml(q.title)}</strong><small>${escapeHtml(q.module_code)}</small></span><span class="badge done">Open quiz</span></button>`).join(''):'<p class="muted">No quizzes in this module yet.</p>';document.querySelectorAll('[data-quiz]').forEach(b=>b.addEventListener('click',()=>loadQuiz(b.dataset.quiz)))}catch(err){showMsg($('quizListMsg'),`Could not load quizzes: ${err.message}`,'error')}}
async function loadQuiz(id){try{const quiz=await api(`/quiz/${id}`);currentQuiz=quiz;$('quizTitle').textContent=quiz.title;$('quizModule').textContent=`Module: ${quiz.module_code}`;$('questionsBox').innerHTML=quiz.questions.map((q,i)=>renderQuestion(q,i+1)).join('');$('quizCard').classList.remove('hidden');$('quizCard').scrollIntoView({behavior:'smooth',block:'start'})}catch(err){showMsg($('quizListMsg'),`Could not load quiz: ${err.message}`,'error')}}
function renderQuestion(q,num){let body='';if(q.type==='mcq')body=q.options.map((opt,i)=>`<div class="option-row"><input type="radio" name="q_${q.question_id}" id="q_${q.question_id}_${i}" value="${escapeHtml(opt)}"><label for="q_${q.question_id}_${i}">${escapeHtml(opt)}</label></div>`).join('');else if(q.type==='short')body=`<input type="text" id="q_${q.question_id}" placeholder="Maximum 2 words" oninput="limitShortAnswer(this)">`;else body=`<textarea id="q_${q.question_id}" placeholder="Write your answer here"></textarea>`;const image=q.image_url?`<img src="${q.image_url}" alt="Question image">`:'';return `<div class="q"><span class="qmarks">${q.marks} mark${q.marks==1?'':'s'}</span><div class="qtext"><span class="qnum">Q${num}.</span>${escapeHtml(q.question)}</div>${image}${body}</div>`}
$('submitBtn').addEventListener('click',async()=>{const name=$('studentName').value.trim(),studentId=$('studentId').value.trim();if(!name||!studentId){showMsg($('submitMsg'),'Enter your name and student ID before submitting.','error');return}const answers=currentQuiz.questions.map(q=>{let answer='';if(q.type==='mcq'){const checked=document.querySelector(`input[name="q_${q.question_id}"]:checked`);answer=checked?checked.value:''}else answer=$(`q_${q.question_id}`).value.trim();return{question_id:q.question_id,answer}});$('submitBtn').disabled=true;try{const result=await api(`/quiz/${currentQuiz.quiz_id}/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student_id:studentId,student_name:name,answers})});currentSubmissionId=result.submission_id;$('quizCard').classList.add('hidden');$('resultCard').classList.remove('hidden');$('autoScoreText').textContent=result.fully_marked?'All questions were auto-markable — this is your final score:':'Auto-marked score so far:';$('scoreStamp').innerHTML=`<div class="score-stamp">${result.auto_marked_score} / ${result.max_score}</div>`;$('pendingNote').textContent=result.fully_marked?'Your script is ready to download.':'Long-answer questions are still being marked. You can download your current script now or return later.';$('checkStudentId').value=studentId}catch(err){showMsg($('submitMsg'),`Could not submit: ${err.message}`,'error')}finally{$('submitBtn').disabled=false}});
function downloadScript(id,studentId){window.location.href=`/student/submission/${id}/pdf?student_id=${encodeURIComponent(studentId)}`}
$('downloadNewBtn').addEventListener('click',()=>downloadScript(currentSubmissionId,$('studentId').value.trim()));
$('checkBtn').addEventListener('click',async()=>{const studentId=$('checkStudentId').value.trim();if(!studentId){showMsg($('resultsBox'),'Enter your student ID.','error');return}try{const results=await api(`/results/${encodeURIComponent(studentId)}`);$('resultsBox').innerHTML=results.map(r=>`<div class="q"><span class="qmarks">${r.total_score} / ${r.max_score}</span><div class="qtext">${escapeHtml(r.quiz_title)} <span class="badge ${r.fully_marked?'done':'pending'}">${r.fully_marked?'Final':'Pending'}</span></div><p class="muted">${escapeHtml(r.module_code)} · ${escapeHtml(r.status)} · submitted ${formatSAST(r.submitted_at)}</p><button class="row-download-btn" data-script="${r.submission_id}">Download script</button></div>`).join('');document.querySelectorAll('[data-script]').forEach(b=>b.addEventListener('click',()=>downloadScript(b.dataset.script,studentId)))}catch(err){showMsg($('resultsBox'),`Could not find results: ${err.message}`,'error')}});
$('backToModulesBtn').addEventListener('click',()=>{$('quizListCard').classList.add('hidden');$('moduleCard').classList.remove('hidden')});
const params=new URLSearchParams(location.search);if(params.get('module'))loadModule(params.get('module'));else if(params.get('quiz'))loadQuiz(params.get('quiz'));else loadModules();
</script><script src="/static/pwa.js"></script></body></html>
