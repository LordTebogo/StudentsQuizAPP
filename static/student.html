<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student — Quiz App</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand-group"><img class="brand-logo" src="/branding/logo" alt="" onerror="this.style.display='none'"><div class="brand-text"><div class="brand">Quiz<span>Mark</span></div><div class="brand-tagline">Bioscientist</div></div></div>
    <nav><a href="/static/index.html">Home</a><a href="/static/lecturer.html">Lecturer view</a></nav>
  </header>

  <h1>Take a quiz</h1>
  <p class="lede">Enter the quiz ID your lecturer shared, fill in your details, and submit your answers.</p>

  <!-- Load quiz -->
  <div class="card" id="loadCard">
    <label for="quizIdInput">Quiz ID</label>
    <input type="text" id="quizIdInput" placeholder="e.g. 1">
    <button class="btn" id="loadQuizBtn">Load quiz</button>
    <div id="loadMsg"></div>
  </div>

  <!-- Quiz form -->
  <div class="card hidden" id="quizCard">
    <h2 id="quizTitle"></h2>
    <label for="studentName">Your name</label>
    <input type="text" id="studentName" placeholder="Full name">
    <label for="studentId">Your student ID</label>
    <input type="text" id="studentId" placeholder="e.g. ST12345">
    <div id="questionsBox"></div>
    <button class="btn" id="submitBtn">Submit answers</button>
    <div id="submitMsg"></div>
  </div>

  <!-- Result stamp after submit -->
  <div class="card hidden" id="resultCard">
    <h2>Submitted</h2>
    <p id="autoScoreText" class="muted"></p>
    <div id="scoreStamp"></div>
    <p id="pendingNote" class="muted"></p>
  </div>

  <!-- Check results later -->
  <div class="card">
    <h2>Check your results</h2>
    <p class="muted">Come back here any time on this network to see if your long-answer questions have been marked.</p>
    <label for="checkStudentId">Your student ID</label>
    <input type="text" id="checkStudentId" placeholder="e.g. ST12345">
    <label for="checkQuizId">Quiz ID (optional — leave blank to see all your quizzes)</label>
    <input type="text" id="checkQuizId" placeholder="e.g. 1">
    <button class="btn secondary" id="checkBtn">Check results</button>
    <div id="resultsBox"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let currentQuiz = null;

// Always display times in South African time (SAST, UTC+2), regardless of
// the viewing device's own timezone/locale settings.
function formatSAST(isoString) {
  const d = isoString ? new Date(isoString) : new Date();
  return d.toLocaleString('en-ZA', {
    timeZone: 'Africa/Johannesburg',
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  }) + ' SAST';
}

async function api(path, options) {
  const res = await fetch(path, options);
  let data = null;
  try { data = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    const detail = (data && data.detail) ? data.detail : res.statusText;
    throw new Error(detail);
  }
  return data;
}

function showMsg(el, text, kind) {
  el.innerHTML = `<div class="msg ${kind}">${text}</div>`;
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Load quiz -------------------------------------------------------
async function loadQuiz(quizId) {
  const msgBox = $('loadMsg');
  try {
    const quiz = await api(`/quiz/${quizId}`);
    currentQuiz = quiz;
    $('quizTitle').textContent = quiz.title;
    $('questionsBox').innerHTML = quiz.questions.map((q, i) => renderQuestion(q, i + 1)).join('');
    $('quizCard').classList.remove('hidden');
    $('checkQuizId').value = quizId;
    msgBox.innerHTML = '';
  } catch (err) {
    showMsg(msgBox, `Could not load quiz: ${err.message}`, 'error');
    $('quizCard').classList.add('hidden');
  }
}

function renderQuestion(q, num) {
  let body = '';
  if (q.type === 'mcq') {
    body = q.options.map((opt, idx) => `
      <div class="option-row">
        <input type="radio" name="q_${q.question_id}" id="q_${q.question_id}_${idx}" value="${escapeHtml(opt)}">
        <label for="q_${q.question_id}_${idx}">${escapeHtml(opt)}</label>
      </div>`).join('');
  } else if (q.type === 'short') {
    body = `<input type="text" id="q_${q.question_id}" placeholder="Your answer">`;
  } else {
    body = `<textarea id="q_${q.question_id}" placeholder="Write your answer here"></textarea>`;
  }
  const imgHtml = q.image_url
    ? `<img src="${q.image_url}" alt="Question image" style="max-width:100%;border:1px solid var(--border);border-radius:4px;margin:10px 0;">`
    : '';
  return `
    <div class="q">
      <span class="qmarks">${q.marks} mark${q.marks == 1 ? '' : 's'}</span>
      <div class="qtext"><span class="qnum">Q${num}.</span>${escapeHtml(q.question)}</div>
      ${imgHtml}
      ${body}
    </div>`;
}

$('loadQuizBtn').addEventListener('click', () => {
  const id = $('quizIdInput').value.trim();
  if (!id) {
    showMsg($('loadMsg'), 'Enter a quiz ID.', 'error');
    return;
  }
  loadQuiz(id);
});

// auto-load if quiz ID passed in URL, e.g. student.html?quiz=1
const params = new URLSearchParams(window.location.search);
if (params.get('quiz')) {
  $('quizIdInput').value = params.get('quiz');
  loadQuiz(params.get('quiz'));
}

// ---- Submit answers -----------------------------------------------------
$('submitBtn').addEventListener('click', async () => {
  const msgBox = $('submitMsg');
  const name = $('studentName').value.trim();
  const studentId = $('studentId').value.trim();
  if (!name || !studentId) {
    showMsg(msgBox, 'Enter your name and student ID before submitting.', 'error');
    return;
  }

  const answers = currentQuiz.questions.map(q => {
    let value = '';
    if (q.type === 'mcq') {
      const checked = document.querySelector(`input[name="q_${q.question_id}"]:checked`);
      value = checked ? checked.value : '';
    } else {
      const el = $(`q_${q.question_id}`);
      value = el ? el.value.trim() : '';
    }
    return { question_id: q.question_id, answer: value };
  });

  $('submitBtn').disabled = true;
  try {
    const result = await api(`/quiz/${currentQuiz.quiz_id}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: studentId, student_name: name, answers }),
    });

    $('quizCard').classList.add('hidden');
    $('resultCard').classList.remove('hidden');
    $('autoScoreText').textContent = result.fully_marked
      ? 'All questions were auto-markable — this is your final score:'
      : 'Auto-marked score so far (multiple-choice and short answers):';
    $('scoreStamp').innerHTML = `<div class="score-stamp">${result.auto_marked_score} / ${result.max_score}</div>`;
    $('pendingNote').textContent = result.fully_marked
      ? ''
      : 'Your long-answer question(s) still need to be marked by your lecturer. Check back here later using your student ID.';
    $('checkStudentId').value = studentId;
    $('checkQuizId').value = currentQuiz.quiz_id;
  } catch (err) {
    showMsg(msgBox, `Could not submit: ${err.message}`, 'error');
  } finally {
    $('submitBtn').disabled = false;
  }
});

// ---- Check results --------------------------------------------------------
$('checkBtn').addEventListener('click', async () => {
  const box = $('resultsBox');
  const studentId = $('checkStudentId').value.trim();
  const quizId = $('checkQuizId').value.trim();
  if (!studentId) {
    showMsg(box, 'Enter your student ID.', 'error');
    return;
  }
  let url = `/results/${encodeURIComponent(studentId)}`;
  if (quizId) url += `?quiz_id=${encodeURIComponent(quizId)}`;

  try {
    const results = await api(url);
    box.innerHTML = results.map(r => `
      <div class="q">
        <span class="qmarks">${r.total_score} / ${r.max_score}</span>
        <div class="qtext">Quiz #${r.quiz_id} <span class="badge ${r.fully_marked ? 'done' : 'pending'}">${r.fully_marked ? 'Final' : 'Pending'}</span></div>
        <p class="muted">${r.status} — submitted ${formatSAST(r.submitted_at)}</p>
      </div>
    `).join('');
  } catch (err) {
    showMsg(box, `Could not find results: ${err.message}`, 'error');
  }
});
</script>
</body>
</html>
